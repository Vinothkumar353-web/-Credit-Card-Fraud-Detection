<!DOCTYPE html>
<html>
<head>
    <title>Credit Card Fraud Detection</title>
</head>
<body>
    <h2>Enter 13 Feature Values</h2>

    <form action="/predict-form" method="POST">
        {% for i in range(1,14) %}
            <label>Feature {{ i }}:</label>
            <input type="number" step="any" name="feature{{ i }}" required>
            <br><br>
        {% endfor %}

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <h3>Prediction: {{ prediction }}</h3>
    {% endif %}
</body>
</html>
